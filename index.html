<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LET'S VISION 2026 展商导航</title>
  <meta http-equiv="refresh" content="0; url=./展商导航.html">
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f5f7fb;
      --text: #1f2937;
      --muted: #6b7280;
      --card: #ffffff;
      --line: #dbe2ea;
      --brand: #2563eb;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --text: #e5e7eb;
        --muted: #94a3b8;
        --card: #111827;
        --line: #243244;
        --brand: #60a5fa;
      }
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .card {
      max-width: 560px;
      width: 100%;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 24px;
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 24px;
    }

    p {
      margin: 0;
      color: var(--muted);
    }

    a {
      color: var(--brand);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>正在进入展商导航</h1>
    <p>
      如果页面没有自动跳转，请手动打开
      <a href="./展商导航.html">`展商导航.html`</a>。
    </p>
  </main>
</body>
</html>
